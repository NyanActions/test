name: "VRCDepots"
on:
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Setup steamcmd
        uses: buildalon/setup-steamcmd@v1
      - name: Download VRChat
        run: |
          mkdir ${{ github.workspace }}/vrchat_public
          steamcmd \
            +@sSteamCmdForcePlatformType windows \
            +force_install_dir ${{ github.workspace }}/vrchat_public \
            +login "${{ secrets.VRCDEPOTS_USER }}" "${{ secrets.VRCDEPOTS_PASSWORD }}" \
            +app_update 438100 validate +quit
      - name: Check files
        run: |
          ls -la ${{ github.workspace }}/vrchat_public/
      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: vrchat-public
          path: ${{ github.workspace }}/vrchat_public/
